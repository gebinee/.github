#file: noinspection SpellCheckingInspection
name: Tauri Build

# 可复用工作流：基于指定 tag 构建 6 平台安装包并上传 artifact
on:
  workflow_call:
    inputs:
      tag_name:
        description: 'Tag name'
        type: string
        required: true
    secrets:
      TAURI_SIGNING_PRIVATE_KEY:
        required: true
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: true
      APPLE_CERTIFICATE:
        required: true
      APPLE_CERTIFICATE_PASSWORD:
        required: true
      KEYCHAIN_PASSWORD:
        required: true
      APPLE_API_ISSUER:
        required: true
      APPLE_API_KEY:
        required: true
      APPLE_API_KEY_FILE:
        required: true
      GPG_PRIVATE_KEY:
        required: true
      GPG_SIGN_KEY_ID:
        required: true
      GPG_SIGN_PASSPHRASE:
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.tauri_platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            tauri_platform: windows-x86_64
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            tauri_platform: windows-aarch64
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            tauri_platform: linux-x86_64
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            tauri_platform: linux-aarch64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            tauri_platform: darwin-x86_64
          - runner: macos-15
            target: aarch64-apple-darwin
            tauri_platform: darwin-aarch64
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Import Apple Developer Certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1)
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV
          rm -f certificate.p12
          echo "Apple certificate imported, signing identity: $CERT_ID"

      - name: Write Apple API key for notarization
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_FILE: ${{ secrets.APPLE_API_KEY_FILE }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$APPLE_API_KEY_FILE" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY}.p8
          chmod 600 ~/private_keys/AuthKey_${APPLE_API_KEY}.p8
          echo "APPLE_API_KEY_PATH=$HOME/private_keys/AuthKey_${APPLE_API_KEY}.p8" >> $GITHUB_ENV
          echo "Apple API key written to: $HOME/private_keys/AuthKey_${APPLE_API_KEY}.p8"

      - name: Import GPG private key for AppImage signing
        if: runner.os == 'Linux'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_SIGN_PASSPHRASE: ${{ secrets.GPG_SIGN_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpg-connect-agent reloadagent /bye || true
          printf '%s' "$GPG_PRIVATE_KEY" | base64 --decode | gpg \
              --import \
              --batch \
              --pinentry-mode loopback \
              --passphrase "$GPG_SIGN_PASSPHRASE"
          gpg --list-secret-keys --keyid-format long

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          SIGN: ${{ runner.os == 'Linux' && '1' || '' }}
          SIGN_KEY: ${{ secrets.GPG_SIGN_KEY_ID }}
          APPIMAGETOOL_SIGN_PASSPHRASE: ${{ secrets.GPG_SIGN_PASSPHRASE }}
          APPIMAGETOOL_FORCE_SIGN: '1'
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.tauri_platform }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error
