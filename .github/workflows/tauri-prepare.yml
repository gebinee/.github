#file: noinspection SpellCheckingInspection
name: Tauri Prepare

# 可复用工作流：计算新版本号、同步版本文件、提交并打 tag
on:
  workflow_call:
    inputs:
      branch:
        description: 'Version branch'
        type: string
        required: true
      version_bump:
        description: 'Version increment options'
        type: string
        required: true
    outputs:
      new_version:
        description: 'New version number'
        value: ${{ jobs.prepare.outputs.new_version }}

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare (compute version, commit, tag)
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.compute_version.outputs.new_version }}
      tag_name: ${{ steps.compute_version.outputs.tag_name }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.x'

      - name: Install tomlkit
        run: pip install tomlkit

      - name: Compute new version and sync files
        id: compute_version
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const tauriConf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          const currentVersion = tauriConf.version;
          const parts = currentVersion.split('.').map(Number);
          if (parts.length !== 3 || parts.some(n => Number.isNaN(n))) {
              throw new Error(`Invalid current version: ${currentVersion}`);
          }
          const [major, minor, patch] = parts;
          const bumpMode = process.env.VERSION_BUMP;
          let newVersion;
          if (bumpMode === 'patch') {
              newVersion = `${major}.${minor}.${patch + 1}`;
          } else if (bumpMode === 'minor') {
              newVersion = `${major}.${minor + 1}.0`;
          } else if (bumpMode === 'major') {
              newVersion = `${major + 1}.0.0`;
          } else {
              throw new Error(`Invalid version_bump: ${bumpMode}`);
          }
          // Update tauri.conf.json
          tauriConf.version = newVersion;
          fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauriConf, null, 2) + '\n');
          // Update package.json
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = newVersion;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          // Set step outputs
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `new_version=${newVersion}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag_name=v${newVersion}\n`);
          console.log(`Current version: ${currentVersion}`);
          console.log(`New version: ${newVersion}`);
          EOF

      - name: Update Cargo.toml version
        env:
          NEW_VERSION: ${{ steps.compute_version.outputs.new_version }}
        run: |
          python -c "
          import tomlkit
          with open('src-tauri/Cargo.toml', 'r', encoding='utf-8') as f:
              doc = tomlkit.parse(f.read())
          doc['package']['version'] = '${NEW_VERSION}'
          with open('src-tauri/Cargo.toml', 'w', encoding='utf-8') as f:
              f.write(tomlkit.dumps(doc))
          print(f'Cargo.toml version updated to {doc[\"package\"][\"version\"]}')
          "

      - name: Sync package-lock.json
        run: npm install --package-lock-only

      - name: Verify version sync
        env:
          NEW_VERSION: ${{ steps.compute_version.outputs.new_version }}
        run: |
          echo "Verifying version sync..."
          node -e "const t=JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json','utf8'));if(t.version!==process.env.NEW_VERSION)throw new Error('tauri.conf.json version mismatch')"
          node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8'));if(p.version!==process.env.NEW_VERSION)throw new Error('package.json version mismatch')"
          node -e "const l=JSON.parse(require('fs').readFileSync('package-lock.json','utf8'));if(l.version!==process.env.NEW_VERSION)throw new Error('package-lock.json version mismatch');if(l.packages[''].version!==process.env.NEW_VERSION)throw new Error('package-lock.json packages[\"\"] version mismatch')"
          grep -E "^version = \"${NEW_VERSION}\"" src-tauri/Cargo.toml || { echo "Cargo.toml version not found"; exit 1; }
          echo "All version files synced to ${NEW_VERSION}"

      - name: Commit and push
        env:
          NEW_VERSION: ${{ steps.compute_version.outputs.new_version }}
          BRANCH: ${{ inputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml package.json package-lock.json
          git commit -m "chore(release): v${NEW_VERSION}"
          git push origin "HEAD:${BRANCH}"

      - name: Create and push tag
        env:
          TAG_NAME: ${{ steps.compute_version.outputs.tag_name }}
        run: |
          git tag "${TAG_NAME}"
          git push origin "${TAG_NAME}"
