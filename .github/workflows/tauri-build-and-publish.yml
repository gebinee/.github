#file: noinspection SpellCheckingInspection
name: Tauri Build and Publish

# 可复用编排器：串联 build → publish 两个子工作流
on:
  workflow_call:
    inputs:
      version_number:
        description: 'Version number'
        type: string
        required: true
      release_notes:
        description: 'Release notes'
        type: string
        required: true
      is_latest:
        description: 'Mark as latest release'
        type: boolean
        required: true
      product_name:
        description: 'Product name'
        type: string
        required: true
      repo_name:
        description: 'Name of consumer repository'
        type: string
        required: true
    secrets:
      TAURI_SIGNING_PRIVATE_KEY:
        required: true
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: true
      APPLE_CERTIFICATE:
        required: true
      APPLE_CERTIFICATE_PASSWORD:
        required: true
      KEYCHAIN_PASSWORD:
        required: true
      APPLE_API_ISSUER:
        required: true
      APPLE_API_KEY:
        required: true
      APPLE_API_KEY_FILE:
        required: true
      GPG_PRIVATE_KEY:
        required: true
      GPG_SIGN_KEY_ID:
        required: true
      GPG_SIGN_PASSPHRASE:
        required: true
      UPDATE_INFO_TOKEN:
        required: true

jobs:
  build:
    uses: ./.github/workflows/tauri-build.yml
    with:
      tag_name: v${{ inputs.version_number }}
    secrets: inherit

  publish:
    needs: [build]
    uses: ./.github/workflows/tauri-publish.yml
    with:
      version_number: ${{ inputs.version_number }}
      release_notes: ${{ inputs.release_notes }}
      is_latest: ${{ inputs.is_latest }}
      product_name: ${{ inputs.product_name }}
      repo_name: ${{ inputs.repo_name }}
    secrets:
      UPDATE_INFO_TOKEN: ${{ secrets.UPDATE_INFO_TOKEN }}
